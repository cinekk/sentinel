services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - db-data:/app/data
    expose:
      - "8000"

  pitch:
    build:
      context: .
      dockerfile: Dockerfile.pitch
    restart: unless-stopped
    expose:
      - "80"

  vaultclaw-pitch:
    image: caddy:2-alpine
    restart: unless-stopped
    volumes:
      - ${CLAWCHAIN_DIR:-/home/ubuntu/clawchain}/web/public/pitch-vaultclaw:/srv:ro
      - ./Caddyfile.vaultclaw-pitch:/etc/caddy/Caddyfile:ro
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config

volumes:
  db-data:
  caddy-data:
  caddy-config:
