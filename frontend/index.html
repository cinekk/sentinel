<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SENTINEL — Situational Awareness</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <div>
    <h1>⚠ SENTINEL</h1>
    <div class="subtitle">Platforma Świadomości Sytuacyjnej — Województwo Lubelskie</div>
  </div>
  <div id="status-bar">
    <span><span id="status-dot"></span> LIVE</span>
    <span id="last-updated">odświeżanie...</span>
    <span id="event-count">— zdarzeń</span>
  </div>
</header>

<div id="main">
  <div id="map"></div>

  <div id="sidebar">

    <div class="sidebar-section">
      <h3>Warstwy</h3>
      <div id="layer-list">
        <div class="empty-state">Ładowanie warstw…</div>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Symulacja</h3>

      <div id="sim-status">
        <span id="sim-dot"></span>
        <span id="sim-label">Zatrzymana</span>
        <span id="sim-tick" style="margin-left:auto;color:#3a4f6a"></span>
      </div>

      <div class="sim-controls">
        <button class="sim-btn primary" id="btn-start">▶ Start</button>
        <button class="sim-btn danger"  id="btn-stop">■ Stop</button>
        <button class="sim-btn"         id="btn-reset">↺ Reset</button>
      </div>

      <div class="sim-field">
        <label>Wiatr km/h <span id="val-wind">15</span></label>
        <input type="range" id="rng-wind" min="5" max="60" value="15" step="5" />
      </div>

      <div class="sim-field">
        <label>Kierunek wiatru° <span id="val-dir">45 (NE)</span></label>
        <input type="range" id="rng-dir" min="0" max="359" value="45" step="5" />
      </div>

      <div class="sim-field">
        <label>Intensywność <span id="val-int">1.0</span></label>
        <input type="range" id="rng-int" min="1" max="5" value="1" step="1" />
      </div>

      <div id="alert-list"></div>
    </div>

    <div class="sidebar-section" style="flex:0">
      <h3>Zdarzenia</h3>
    </div>
    <div id="event-list">
      <div class="empty-state">Brak zdarzeń</div>
    </div>

    <div id="refresh-info">Auto-odświeżanie co 30s</div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
